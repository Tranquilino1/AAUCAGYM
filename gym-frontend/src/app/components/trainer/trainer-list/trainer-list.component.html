<div class="trainer-container p-4">
  <div class="d-flex justify-content-between align-items-center mb-5">
    <h1>Nuestros Expertos</h1>
    <button class="btn-premium"><mat-icon class="me-2">add</mat-icon> Añadir Entrenador</button>
  </div>

  <div class="row g-4">
    <div class="col-md-4" *ngFor="let trainer of trainers">
      <div class="glass-card trainer-card">
        <div class="trainer-img-wrapper">
          <img [src]="trainer.fotoUrl" [alt]="trainer.nombre" class="trainer-img">
          <div class="specialty-badge">{{trainer.especialidad}}</div>
        </div>
        <div class="p-4">
          <h3 class="mb-1">{{trainer.nombre}}</h3>
          <p class="text-secondary small mb-3">{{trainer.biografia}}</p>
          <div class="d-flex gap-2">
            <button mat-stroked-button color="primary" class="flex-grow-1">Ver Perfil</button>
            <button mat-icon-button color="warn"><mat-icon>delete</mat-icon></button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
