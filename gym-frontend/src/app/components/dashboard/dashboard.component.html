<div class="dashboard-container p-4">
  <h1 class="mb-4">Vista General - AAUCAGYM Guinea Ecuatorial</h1>

  <div class="row g-4 mb-5">
    <div class="col-md-3" *ngFor="let stat of stats">
      <div class="glass-card p-4 h-100 d-flex align-items-center">
        <div class="icon-box me-3" [style.background-color]="stat.color + '22'">
          <mat-icon [style.color]="stat.color">{{stat.icon}}</mat-icon>
        </div>
        <div>
          <div class="text-secondary small">{{stat.label}}</div>
          <div class="h3 mb-0">{{stat.value}}</div>
        </div>
      </div>
    </div>
  </div>

  <div class="row g-4">
    <div class="col-md-8">
      <div class="glass-card p-4 h-100">
        <h3>Horario de Clases - Diblóhó</h3>
        <p class="text-secondary">Actividades de hoy</p>
        <div class="activities-list mt-4">
          <!-- Placeholder for schedule -->
          <div class="activity-item d-flex justify-content-between p-3 mb-2 rounded border border-light border-opacity-10">
            <div>
              <div class="fw-bold">Yoga Flow - Malabo</div>
              <div class="small text-secondary">Sala A - 09:00 AM</div>
            </div>
            <button mat-icon-button color="accent"><mat-icon>chevron_right</mat-icon></button>
          </div>
          <div class="activity-item d-flex justify-content-between p-3 mb-2 rounded border border-light border-opacity-10">
            <div>
              <div class="fw-bold">CrossFit HIIT</div>
              <div class="small text-secondary">Main Hall - 11:30 AM</div>
            </div>
            <button mat-icon-button color="accent"><mat-icon>chevron_right</mat-icon></button>
          </div>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="glass-card p-4 h-100">
        <h3>Inscripciones Recientes</h3>
        <div class="enrollment-list mt-4">
          <div class="d-flex align-items-center mb-3">
            <div class="avatar me-3">JD</div>
            <div>
              <div class="small fw-bold">Juan Diosdado</div>
              <div class="x-small text-secondary">Plan Premium</div>
            </div>
          </div>
          <div class="d-flex align-items-center mb-3">
            <div class="avatar me-3">MS</div>
            <div>
              <div class="small fw-bold">Mark Smith</div>
              <div class="x-small text-secondary">Basic Plan</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
